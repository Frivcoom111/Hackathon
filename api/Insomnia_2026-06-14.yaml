          - url: "{{BASE_URL}}/auth/login"
            name: Login
            meta:
              id: req_9c914d1e1b5346e9b6a5a1f1408ee804
              created: 1781392285134
              modified: 1781452252808
              isPrivate: false
              description: STUDENT/ADMIN recebem JWT completo. COMPANY recebe um tempToken
                (5min) e segue para o fluxo TOTP (setup no primeiro acesso,
                verify nos seguintes).
              sortKey: -1781392283946
            method: POST
            body:
              mimeType: application/json
              text: |-
                {
                	"email": "usuario@exaple.com",
                  "password": "Password1@"
                }
            headers:
              - name: Content-Type
                value: application/json
            scripts:
              afterResponse: |-
                const res = insomnia.response.json();
                if (res && res.success && res.data) {
                  const d = res.data;
                  if (d.type === "AUTHENTICATED" && d.token) {
                    insomnia.environment.set("TOKEN_STUDENT", d.token);
                    console.log("TOKEN_STUDENT salvo");
                  } else if (d.tempToken) {
                    insomnia.environment.set("TOKEN_COMPANY", d.tempToken);
                    console.log("TOKEN_COMPANY (temp) salvo");
                  }
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
