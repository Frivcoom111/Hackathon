$kind: http-request
name: Apply
description: "Candidatura a uma vaga (multipart/form-data). Requer estudante autenticado (TOKEN_STUDENT). `resume` e `coverLetter` são opcionais. Bloqueia candidatura duplicada e estudante inelegível."
method: POST
url: "{{BASE_URL}}/jobs/:jobId/apply"
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_STUDENT}}"
pathVariables:
  jobId: "{{JOB_ID}}"
body:
  type: formdata
  formdata:
    - key: coverLetter
      value: "Tenho grande interesse nesta vaga de estágio."
      type: text
    - key: resume
      type: file
      src: ""
scripts:
  postResponse: |-
    const res = pm.response.json();
    if (res && res.success && res.data && res.data.id) {
      pm.environment.set("APPLICATION_ID", res.data.id);
      console.log("APPLICATION_ID atualizado");
    }
