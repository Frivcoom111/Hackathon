$kind: http-request
name: List Users
description: Listar usuários do banco de dados, somente o usuário logado e sendo admin poderá listar os usuários do banco de dados usando a regra do page e limit.
method: GET
url: "{{BASE_URL}}/users?page=1&limit=20"
order: 1000
queryParams:
  page: "1"
  limit: "20"
