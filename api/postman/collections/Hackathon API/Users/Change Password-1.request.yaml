$kind: http-request
name: Change Password
method: PATCH
url: "{{baseUrl}}/users/:id/password"
order: 6000
pathVariables:
  - key: id
    value: ""
    description: User UUID
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "OldPassword1@",
      "newPassword": "NewPassword1@",
      "confirmPassword": "NewPassword1@"
    }
