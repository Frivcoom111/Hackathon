$kind: http-request
name: Create User
description: Criar usuário do banco de dados, neste caso será a rota que somente o Admin logado poderá acessar, pois podemos usar Role para definir papeis e etc.
method: POST
url: "{{BASE_URL}}/users"
order: 3000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "Password1@",
      "role": "USER"
    }
