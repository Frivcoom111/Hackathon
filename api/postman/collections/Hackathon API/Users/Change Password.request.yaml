$kind: http-request
url: "{{BASE_URL}}/users/:id/password"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  id: ""
body:
  type: json
  content: |-
    {
      "currentPassword": "OldPassword1@",
      "newPassword": "NewPassword1@",
      "confirmPassword": "NewPassword1@"
    }
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_ADMIN}}"
order: 6000
