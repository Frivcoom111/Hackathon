$kind: http-request
url: "{{BASE_URL}}/users/:id"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  id: ""
body:
  type: json
  content: |-
    {
      "name": "John Updated",
      "email": "john.updated@example.com"
    }
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_ADMIN}}"
order: 4000
