$kind: http-request
name: Register
description: "FASE 1 — Cria um usuário com e-mail e senha (hash bcrypt) e retorna { token, user }. O usuário nasce com role USER e mfaVerified: true no JWT."
method: POST
url: "{{BASE_URL}}/auth/register"
order: 1000
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "Password1@"
    }