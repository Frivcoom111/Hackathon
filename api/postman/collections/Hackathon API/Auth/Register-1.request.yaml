$kind: http-request
name: Register Student
description: "Cadastro de estudante (multipart/form-data). Cria User(STUDENT) + Student + StudentCourse em transação. O campo `resume` (currículo PDF/JPG/PNG) é opcional. Não requer autenticação e não retorna token."
method: POST
url: "{{BASE_URL}}/auth/register/student"
order: 1000
auth:
  type: noauth
body:
  type: formdata
  formdata:
    - key: email
      value: "maria.aluna@example.com"
      type: text
    - key: password
      value: "Password1@"
      type: text
    - key: name
      value: "Maria Aluna"
      type: text
    - key: ra
      value: "20231234"
      type: text
    - key: cpf
      value: "12345678901"
      type: text
    - key: phone
      value: "11999998888"
      type: text
    - key: courseId
      value: "{{COURSE_ID}}"
      type: text
    - key: startedAt
      value: "2024-02-01"
      type: text
    - key: resume
      type: file
      src: ""
