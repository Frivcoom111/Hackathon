$kind: http-request
name: Login
description: "FASE 1 — Valida e-mail/senha e retorna um JWT. Para USER o token vem com mfaVerified: true; para ADMIN vem com mfaVerified: false (precisa passar pelo TOTP). O script de post-response salva o token automaticamente em TOKEN_USER ou TOKEN_ADMIN conforme a role."
method: POST
url: "{{BASE_URL}}/auth/login"
order: 2000
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "password": "Password1@"
    }
scripts:
  postResponse: |-
    const res = pm.response.json();
    if (res && res.success && res.data && res.data.token) {
      const role = res.data.user.role;
      if (role === "ADMIN") {
        pm.environment.set("TOKEN_ADMIN", res.data.token);
        console.log("TOKEN_ADMIN atualizado (login admin, mfaVerified=false ainda)");
      } else {
        pm.environment.set("TOKEN_USER", res.data.token);
        console.log("TOKEN_USER atualizado");
      }
    }
