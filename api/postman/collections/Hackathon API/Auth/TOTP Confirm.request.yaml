$kind: http-request
description: Apenas COMPANY. Valida o primeiro código de 6 dígitos do app autenticador e ATIVA o TOTP (totpEnabled = true). Use o TOKEN_COMPANY (tempToken). Em caso de sucesso retorna o JWT final, salvo em TOKEN_COMPANY.
url: "{{BASE_URL}}/auth/totp/setup/confirm"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "code": "123456"
    }
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_COMPANY}}"
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res && res.success && res.data && res.data.token) {
        pm.environment.set("TOKEN_COMPANY", res.data.token);
        console.log("TOKEN_COMPANY atualizado (mfaVerified=true)");
      }
    language: text/javascript
order: 6000
