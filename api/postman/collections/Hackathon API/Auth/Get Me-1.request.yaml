$kind: http-request
name: Get Me
description: "Rota protegida. Retorna o perfil do usuário autenticado a partir do JWT. O conteúdo varia conforme a role (STUDENT, COMPANY, ADMIN). Troque o token conforme o usuário que deseja testar."
method: GET
url: "{{BASE_URL}}/auth/me"
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_STUDENT}}"
