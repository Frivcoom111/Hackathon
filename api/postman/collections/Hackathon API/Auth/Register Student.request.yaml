$kind: http-request
name: Register Student
description: Cadastro de estudante (multipart/form-data). Cria User(STUDENT) + Student + StudentCourse em transação. O campo `resume` (currículo PDF/JPG/PNG) é opcional. Não requer autenticação e não retorna token.
url: "{{BASE_URL}}/auth/register/student"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: email
      value: maria.aluna@example.com
      disabled: false
    - type: text
      key: password
      value: Password1@
      disabled: false
    - type: text
      key: name
      value: Maria Aluna
      disabled: false
    - type: text
      key: ra
      value: "20231234"
      disabled: false
    - type: text
      key: cpf
      value: "12345678901"
      disabled: false
    - type: text
      key: phone
      value: "11999998888"
      disabled: false
    - type: text
      key: courseId
      value: "{{COURSE_ID}}"
      disabled: false
    - type: text
      key: startedAt
      value: 2024-02-01
      disabled: false
    - type: file
      key: resume
      src: []
      disabled: false
auth:
  type: noauth
order: 1000
