$kind: http-request
name: TOTP Setup
description: "FASE 3 — Apenas ADMIN. Gera o secret e o QR Code (data URL PNG) para escanear no Google/Microsoft Authenticator. Use o TOKEN_ADMIN obtido no Login. O qrCode pode ser colado no navegador para visualizar a imagem."
method: GET
url: "{{BASE_URL}}/auth/totp/setup"
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_ADMIN}}"
