$kind: http-request
name: TOTP Verify
description: "Apenas COMPANY. Em logins subsequentes (TOTP já ativo), recebe um código de 6 dígitos e retorna um NOVO JWT com mfaVerified: true. Use o TOKEN_COMPANY (tempToken do login). O script sobrescreve TOKEN_COMPANY com o token final verificado."
method: POST
url: "{{BASE_URL}}/auth/totp/verify"
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "code": "123456"
    }
scripts:
  postResponse: |-
    const res = pm.response.json();
    if (res && res.success && res.data && res.data.token) {
      pm.environment.set("TOKEN_COMPANY", res.data.token);
      console.log("TOKEN_COMPANY atualizado (mfaVerified=true)");
    }
