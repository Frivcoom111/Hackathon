$kind: http-request
name: TOTP Confirm
description: "FASE 3 — Apenas ADMIN. Valida o primeiro código de 6 dígitos do app autenticador e ATIVA o TOTP (totpEnabled = true). Use o TOKEN_ADMIN."
method: POST
url: "{{BASE_URL}}/auth/totp/setup/confirm"
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_ADMIN}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "code": "123456"
    }
