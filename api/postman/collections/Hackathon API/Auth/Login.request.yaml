$kind: http-request
description: "Autentica e-mail/senha. STUDENT/ADMIN recebem { type: AUTHENTICATED, token } (salvo em TOKEN_STUDENT). COMPANY recebe { type: TOTP_SETUP|TOTP_REQUIRED, tempToken } (salvo em TOKEN_COMPANY) e precisa concluir o fluxo TOTP. Mensagem de erro é sempre 'Credenciais inválidas.'"
url: "{{BASE_URL}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "maria.aluna@example.com",
      "password": "Password1@"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res && res.success && res.data) {
        const d = res.data;
        if (d.type === "AUTHENTICATED" && d.token) {
          pm.environment.set("TOKEN_STUDENT", d.token);
          console.log("TOKEN_STUDENT atualizado (login direto)");
        } else if (d.tempToken) {
          pm.environment.set("TOKEN_COMPANY", d.tempToken);
          console.log("TOKEN_COMPANY (temp 5min) salvo — conclua o TOTP para o token final");
        }
      }
    language: text/javascript
order: 3000
