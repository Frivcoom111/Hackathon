$kind: http-request
name: Update Address
description: "Cria ou atualiza (upsert) o endereço do estudante."
method: PUT
url: "{{BASE_URL}}/student/address"
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_STUDENT}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "street": "Rua das Flores",
      "number": "250",
      "complement": "Apto 41",
      "district": "Centro",
      "city": "São Paulo",
      "state": "SP",
      "zipCode": "01001000"
    }
