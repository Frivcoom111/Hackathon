$kind: http-request
description: "Cancela uma candidatura (soft delete: status=CANCELLED). Permitido apenas se a candidatura estiver em PENDING ou ANALYSING. Ownership validado."
url: "{{BASE_URL}}/student/applications/:id"
method: DELETE
pathVariables:
  id: ""
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_STUDENT}}"
order: 6000
