$kind: http-request
name: Update Profile
description: "Atualiza name e/ou phone do estudante."
method: PATCH
url: "{{BASE_URL}}/student/profile"
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_STUDENT}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Maria A. Aluna",
      "phone": "11997776666"
    }
