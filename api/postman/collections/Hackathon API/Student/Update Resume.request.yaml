$kind: http-request
description: "Atualiza o currículo do estudante (multipart/form-data, campo `resume` obrigatório: PDF/JPG/PNG)."
url: "{{BASE_URL}}/student/resume"
method: PATCH
body:
  type: formdata
  content:
    - type: file
      key: resume
      src:
        - ""
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_STUDENT}}"
order: 4000
