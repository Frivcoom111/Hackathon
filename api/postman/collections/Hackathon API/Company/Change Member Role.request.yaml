$kind: http-request
description: Altera o cargo de um membro (ADMIN | RECRUITER). Somente ADMIN da empresa; não é possível alterar o próprio cargo.
url: "{{BASE_URL}}/company/members/:memberId/role"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  memberId: ""
body:
  type: json
  content: |-
    {
      "role": "RECRUITER"
    }
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_COMPANY}}"
order: 4000
