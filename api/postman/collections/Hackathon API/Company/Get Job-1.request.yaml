$kind: http-request
name: Get Job
description: "Detalha uma vaga da empresa. Ownership validado (a vaga deve pertencer à empresa do membro)."
method: GET
url: "{{BASE_URL}}/company/jobs/:jobId"
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
pathVariables:
  jobId: "{{JOB_ID}}"
