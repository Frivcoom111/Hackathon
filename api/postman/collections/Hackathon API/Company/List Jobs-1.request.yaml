$kind: http-request
name: List Jobs
description: "Lista as vagas da empresa (paginado). Qualquer membro COMPANY."
method: GET
url: "{{BASE_URL}}/company/jobs?page=1&limit=10"
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
queryParams:
  page: "1"
  limit: "10"
