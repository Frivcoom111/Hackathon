$kind: http-request
name: Change Member Role
description: "Altera o cargo de um membro (ADMIN | RECRUITER). Somente ADMIN da empresa; não é possível alterar o próprio cargo."
method: PATCH
url: "{{BASE_URL}}/company/members/:memberId/role"
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
pathVariables:
  memberId: "{{MEMBER_ID}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "role": "RECRUITER"
    }
