$kind: http-request
description: "Atualiza o status de uma candidatura (ANALYSING | APPROVED | REJECTED). Fluxo: PENDING → ANALYSING → APPROVED|REJECTED. Ownership validado."
url: "{{BASE_URL}}/company/jobs/:jobId/applications/:id/status"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  jobId: ""
  id: ""
body:
  type: json
  content: |-
    {
      "status": "ANALYSING"
    }
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_COMPANY}}"
order: 12000
