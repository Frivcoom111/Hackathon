$kind: http-request
name: Edit Profile
description: "Atualiza name, description e/ou phone da empresa. Somente ADMIN da empresa. CNPJ não é editável."
method: PATCH
url: "{{BASE_URL}}/company/profile"
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "description": "Nova descrição da empresa.",
      "phone": "1133335555"
    }
