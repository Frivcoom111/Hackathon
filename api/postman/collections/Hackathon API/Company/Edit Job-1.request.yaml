$kind: http-request
name: Edit Job
description: "Atualiza campos de uma vaga. Ownership validado."
method: PATCH
url: "{{BASE_URL}}/company/jobs/:jobId"
order: 9000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
pathVariables:
  jobId: "{{JOB_ID}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "salary": 2000.00,
      "modality": "REMOTE"
    }
