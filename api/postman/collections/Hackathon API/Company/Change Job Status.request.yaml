$kind: http-request
description: "Altera o status da vaga (ACTIVE | PAUSED | CLOSED). CLOSED é terminal: não pode voltar a ACTIVE/PAUSED."
url: "{{BASE_URL}}/company/jobs/:jobId/status"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  jobId: ""
body:
  type: json
  content: |-
    {
      "status": "PAUSED"
    }
auth:
  type: bearer
  credentials:
    token: "{{TOKEN_COMPANY}}"
order: 10000
