$kind: http-request
name: List Applications
description: "Lista as candidaturas de uma vaga (paginado). Ownership validado."
method: GET
url: "{{BASE_URL}}/company/jobs/:jobId/applications?page=1&limit=10"
order: 11000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
pathVariables:
  jobId: "{{JOB_ID}}"
queryParams:
  page: "1"
  limit: "10"
