$kind: http-request
name: Change Application Status
description: "Atualiza o status de uma candidatura (ANALYSING | APPROVED | REJECTED). Fluxo: PENDING → ANALYSING → APPROVED|REJECTED. Ownership validado."
method: PATCH
url: "{{BASE_URL}}/company/jobs/:jobId/applications/:id/status"
order: 12000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{TOKEN_COMPANY}}"
pathVariables:
  jobId: "{{JOB_ID}}"
  id: "{{APPLICATION_ID}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "status": "ANALYSING"
    }
